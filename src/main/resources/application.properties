spring.application.name=newsletter-campaign-mgr
# Server
server.port=8080
# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/newsletter_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# JWT
app.jwt.secret=your_super_secret_key_here_make_it_long_at_least_32_chars
app.jwt.expiration-ms=86400000
# Scheduling
spring.task.scheduling.pool.size=5
# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true